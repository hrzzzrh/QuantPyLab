description = "双轨同步个股动态并基于关注点与增量价值驱动研报演进"
prompt = """
你现在作为 QuantPyLab 的投研总监，用户输入了：{{args}}。
**输入解析**：输入格式通常为“公司名”或“公司名，关注点”（例如：“宁德时代，一季报”或“比亚迪，海外建厂进度”）。请首先分离出目标公司名称和关注点（如有）。

请对执行以下全自动化审计流程：

1. **框架内化**：必须首先深度阅读并理解 @investigation/equities/deep_investment_analysis_framework.md 中的投研方法论与章节间的逻辑依赖关系。
然后按照投研方法论文档中的指导阅读数据资产与查询数据的方法，为量化分析做准备，所有量化分析脚本如果运行失败，必须修改直到运行成功。
最后阅读 investigation/equities/目标公司/reports/ 目录下的每一份研报章节，禁止选择性阅读，理解目前的研究情况，以及明确研究时间锚点。

2. **多维情报抓取 (Multi-Dimensional Intelligence Gathering) - 执行准则**：
   - **关注点专项审计 (User-Defined Focus) [优先级最高]**：
     - 如果用户提供了[关注点]，必须针对关注点构造精准的 Google 搜索词（包含中英文）。
     - **搜索目标**：查证关注点涉及的最新事实、数据偏差、市场传闻及对盈利预测的潜在影响。
     - **财报联动**：如果关注点涉及财报（如“一季报”、“年报”），必须优先下载并深度分析该财报 PDF。
   - **靶向跟踪 (按需执行)**：
     - 首先阅读目标公司的【跟踪手册.md】。
     - 同步公司财务数据，下载公司最新财报文件(必须执行！)
     - **判断逻辑**：检查是否有到期（或临近到期）的待办事项、核心变量观察点、新发布的财报。
     - **执行**：仅当存在到期事项或用户有关注点时，才执行针对性的 Google 搜索；如果有新财报发布，必须阅读分析财报pdf文件。
   - **全域扫描 (广泛抓取) —— 生存变量解耦搜索**：
     - **变量建模**：首先基于研报抽象出公司的“生存变量矩阵”（包含核心营收地、核心成本项、核心监管主体、核心技术路径）。
     - **解耦并发搜索**：强制执行一组 **[变量名] + [动态/风险/政策/趋势]** 的 Google 搜索。**要求：至少 60% 的搜索词必须剥离目标公司名称**，以捕捉“主体搜索盲区”外的环境变动。
     - **约束**：时间范围取研究时间锚点前一周至今天；海外营收占比 > 30% 的公司，**必须执行英文搜索**。

3. **自主判别与逻辑演进 (Thesis Evolution) - 更新准则**：
   - 将搜集到的“关注点信息”、“靶向信息”与“全域信息”与现有报告进行对比。
   - **重要性审计**：评估获取的信息是否属于“重大增量信息”（足以影响盈利预测、估值逻辑或地缘风险评级）。
   - **执行策略**：
     - **关注点回应**：如果用户提供了关注点，无论是否产生“重大增量信息”，都必须在相关章节或【跟踪手册】中明确记录关注点的核实结论。
     - **若无重要增量信息**：保持现有报告不变，严禁进行任何形式的文字微调。
     - **若存在重要增量**：根据框架逻辑链执行**手术刀式级联更新**。
       - **联动约束**：更新必须精准锁定在受信息驱动的变量上。**严禁对研报中已定性的商业模式描述、企业 DNA 审计、历史财务回顾等存量叙述进行重构或润色。**严禁为了当前更新目的而简化、省略或调整文档中存量无关内容。
       - **一致性校验**：级联更新应确保盈利预估、估值定价与基本面变化逻辑自洽。
     - **时间戳更新**：对每一个研报章节都必须更新研究日期为今天。
     - **跟踪手册更新**：如果发现了新的需要跟踪的事项，需要更新跟踪手册，对于已跟踪并融入研报的内容，在跟踪手册中记录。最后更新跟踪手册的时间戳。

4. **技术分析更新 (Technical Momentum Re-Audit) - 更新准则**：
   - **量化对齐**：调用系统视图查询目标公司最近 15 个交易日的量化行情数据（包含不复权/后复权价、估值分位、成交量变动）。
   - **趋势偏差审计**：对比最新行情与【研报章节六：技术面分析.md】中的支撑位、阻力位及路径预判。
   - **执行策略**：
     - **若趋势符合预期**：且未触及关键位，保持报告不变。
     - **若发生显著偏差或触及关键位**：对“研报章节六”执行手术刀式更新。
       - **重点更新**：重新识别当前的趋势架构、修正关键支撑/阻力位数值、更新量价行为解读。
       - **时间戳更新**：同步更新该章节顶部的“研究日期”锚点。

"""
