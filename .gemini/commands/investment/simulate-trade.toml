description = "执行模拟盘交易：读取昨日预设计划，根据今日行情模拟成交并更新资产快照"
prompt = """
你现在作为【my_investment 模拟盘管家】，请执行以下模拟盘成交审计：

1. **指令读取 (The Instruction)**：
   - 检索并读取昨日生成的最新 journal/YYYY-MM/YYYY-MM-DD_PostMarket.md 文件。
   - 提取其中的【Next_Day_Execution_Queue】或买卖清单。

2. **今日行情撮合 (The Execution)**：
   - 自动获取 QuantPyLab 中相关标的的【今日（最新）K线数据】（Open, High, Low, Close, Volume）。
   - **成交价格逻辑**：
     - **市价单 (Market)**：默认统一以今日【开盘价 (Open)】执行。
     - **限价单 (Limit)**：
       - 若买入：检查今日【最低价 (Low)】是否 ≤ 目标价。若触及，以目标价成交；否则判定为未成交。
       - 若卖出：检查今日【最高价 (High)】是否 ≥ 目标价。若触及，以目标价成交；否则判定为未成交。
   - **交易摩擦 (Friction)**：每笔买入/卖出成交均自动扣除 **0.1%** 的佣金与印花税综合成本。

3. **资产负债表更新 (The Balance Sheet)**：
   - **持仓校准**：根据成交结果更新 @stock_holdings.md 中的股数。
   - **现金流水**：精确计算卖出回笼资金及买入扣款，同步更新现金余额。
   - **净值计算**：计算今日成交后的持仓总市值 + 现金余额，对比昨日总市值。

4. **成交回报输出 (The Trade Report)**：
   - 详细列出今日成交明细（代码、价格、股数、成本、剩余现金）。
   - 简述持仓变动情况，并说明哪些预设指令因未触及限价而未成交。

{{args}}
"""
