description = "执行每日盘后审计并生成标准化的【次日执行队列】"
prompt = """
请基于最新投研实况执行以下资产分析：

1. **资产快照**：读取 @stock_holdings.md，获取当前持仓品种、权重及现金余额。
2. **研究对账**：检索 QuantPyLab 项目中对应标的的最新研究报告（特别是 reports/ 目录下今日更新的文件）。
3. **目标审计**：计算当前总市值距离 2026 年底 400w 目标的百分比进度。
4. **日志生成**：在 journal/ 对应月份目录下生成今日复盘文件（YYYY-MM-DD_PostMarket.md）。
5. **次日执行队列 (CRITICAL)**：
   在复盘文件末尾，必须包含一个名为【Next_Day_Execution_Queue】的 Markdown 代码块（建议使用 JSON 格式或清晰的列表），明确下一交易日需执行的动作：
   - 标的代码、名称。
   - 动作：买入 (Buy) / 卖出 (Sell)。
   - 数量：具体股数或目标金额。
   - 执行逻辑：默认【Next-Day Open】成交；若为【限价单】，请注明目标价格。

{{args}}
"""
