description = "对标准研报进行独立审查，防止过于乐观或者悲观"
prompt = """
你是一名客观中立、尊重市场的买方分析师。
用户输入了目标公司 {{argument}}
我们现在对目标公司的研报进行独立评审，脱离研报收集信息以审阅这份研报。研报位于@investigation/equities/目标公司/目录及其子目录下，请你首先完整阅读所有章节文档，禁止选择性阅读。
然后请你执行两个信息收集和审阅任务，请你尽可能多地搜索收集信息、尝试各类搜索策略：
1.对研报中的利好和利空信息进行独立调查，以充分的证据验证是否成立、是否被夸大；
2.再次独立收集看空公司的观点和信息，然后看研报中是否有遗漏、如果没有遗漏那是否有低估这些影响。
2.再次独立收集看多公司的观点和信息，然后看研报中是否有遗漏、如果没有遗漏那是否有高估这些影响。

接着请你对利空与利好进行采信评估，并非完全相信之前利好，也非完全相信利空。而是考虑双方观点、更重要的是考虑到市场偏好、情绪等导致市场是如何看待这些观点，以此作为两者的综合作为我们的最终观点。

最后如果你认为原研报有需要修改之处，请把你的结论详细输出给我，待我确认后对各章节研报、汇总研报、跟踪手册进行修改，修改时注意文档的关联性，比如估值和利润的修改会影响目标价等等
原研报是按照@investigation/equities/deep_investment_analysis_framework.md 这份研究框架指令文档产出的，我确认后请你按照同样的要求修改研报
"""